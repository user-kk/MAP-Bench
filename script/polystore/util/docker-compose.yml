version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: postgres
    restart: unless-stopped
    # 如需额外调优，可把自定义 postgresql.conf 挂进去
    # command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_PASSWORD: linux123   # 相当于 MySQL 的 root 密码
      TZ: Asia/Shanghai
    ports:
      - "30000:5432"
    volumes:
      # PG 数据目录
      - pg_data:/var/lib/postgresql/data
      # 临时文件、外部只读目录保持原样
      - /tmp/polystore:/tmp/polystore
      - /openalex_middle:/openalex_middle

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: linux123   
    ports:
      - "30001:27017"
    volumes:
      - mongo_data:/data/db
      - /tmp/polystore:/tmp/polystore
      - /openalex_middle:/openalex_middle

  neo4j:
    image: neo4j:5.24
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/linux123
      # 启用 APOC
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: 64g
      NEO4J_server_memory_heap_max__size: 64g
      NEO4J_server_memory_pagecache_size: 32g
      NEO4J_dbms_connector_bolt_connection_max_lifetime: 0
      NEO4J_dbms_transaction_timeout: 0
      NEO4JLABS_PLUGINS: '["apoc"]' 
    ports:
      - "30002:7474"
      - "30003:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - /tmp/polystore:/tmp/polystore
      - /openalex_middle:/openalex_middle
      - /tmp/polystore:/var/lib/neo4j/import
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 40000
        hard: 40000
    deploy:
      resources:
        limits:
          memory: 100g          # 略大于 heap+page
        reservations:
          memory: 100g

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_LOG_LEVEL=info
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=default=http://etcd:2380
    ports:                                    
      - "30010:2379"
      - "30011:2380"
    volumes:
      - etcd_data:/etcd-data

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:                                    
      - "30012:9000"   # API
      - "30013:9001"   # Console
    volumes:
      - minio_data:/minio-data
      
    command: minio server /minio-data --console-address ":9001"

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: milvus
    restart: unless-stopped
    ports:
      - "30004:19530"
      - "30005:9091"
    environment:
      ETCD_ENDPOINTS: "etcd:2379"       
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
    volumes:
      - /tmp/polystore:/var/lib/milvus/import
      - milvus_data:/var/lib/milvus
      - /tmp/polystore:/tmp/polystore
      - /openalex_middle:/openalex_middle
    depends_on:
      - etcd
      - minio
    command: ["milvus", "run", "standalone"]


  attu: # milvus的图形界面
    image: zilliz/attu:v2.3.8
    container_name: attu
    restart: unless-stopped
    ports:
      - "30006:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus

volumes:
  pg_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:
  etcd_data:
  minio_data:
  milvus_data: